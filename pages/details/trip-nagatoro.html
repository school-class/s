        <h2>水辺の絶景と癒やしの1日</h2>
        <p>都心から約2時間。秩父鉄道「長瀞駅」を降りれば、そこには豊かな自然が広がっています。岩畳の散策とライン下りを中心とした、水辺を満喫するプランです。</p>

                <li>11:00 ライン下り体験</li>
                <li>12:30 駅周辺でランチ（蕎麦など）</li>
                <li>14:00 宝登山神社参拝</li>
