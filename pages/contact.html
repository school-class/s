<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>お問い合わせ | 埼玉、想像以上。</title>
    <link rel="stylesheet" href="../css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700;900&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="logo"><a href="../index.html" style="text-decoration: none; color: inherit;">埼玉、想像以上。</a></div>
                        <ul class="nav-links"><li><a href="../index.html">ホーム</a></li><li><a href="access.html">アクセス</a></li></ul>
            </nav>
    </header>

    <main class="container" style="padding: 100px 8%;">
        <h1 style="text-align: center; margin-bottom: 50px;">お問い合わせ</h1>

        <div style="max-width: 600px; margin: 0 auto; background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.05);">
            <form>
                <div style="margin-bottom: 20px;">
                    <label style="display: block; margin-bottom: 5px;">お名前</label>
                    <input type="text" style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px;">
                </div>
                <div style="margin-bottom: 20px;">
                    <label style="display: block; margin-bottom: 5px;">メールアドレス</label>
                    <input type="email" style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px;">
                </div>
                <div style="margin-bottom: 20px;">
                    <label style="display: block; margin-bottom: 5px;">内容</label>
                    <textarea style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px; height: 150px;"></textarea>
                </div>
                <button type="button" class="btn" style="width: 100%; border: none; cursor: pointer;">送信する（デモ）</button>
            </form>
        </div>

        <div style="text-align: center; margin-top: 60px;">
            <a href="../index.html" class="btn">トップへ戻る</a>
        </div>
    </main>

    <footer>
        <p>© 2026 埼玉、想像以上。</p>
    </footer>
    <script src="../js/main.js"></script>
</body>
</html>
